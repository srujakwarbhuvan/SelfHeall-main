<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop v2 - Kameleon</title>
    <!-- Use Inter font for clean minimal layout -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; padding: 2rem; max-width: 400px; margin: auto; }
        .badge { background: #e0f2fe; color: #0284c7; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; display: inline-block; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500;}
        input { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #000; color: #fff; padding: 0.875rem 1rem; border: none; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 1rem; font-weight: 600; font-size: 1rem; }
        #order-confirm { color: #16a34a; margin-top: 1.5rem; text-align: center; font-weight: 500;}
    </style>
</head>
<body>
    <div class="badge">v2 — redesigned layout</div>
    <h2 style="margin-top: 0; margin-bottom: 1.5rem;">Checkout</h2>
    <div class="form-group">
        <label>Email address</label>
        <input id="user-email" type="email" placeholder="Enter your email">
    </div>
    <div class="form-group">
        <label>Promo code (optional)</label>
        <input id="discount-code" type="text" placeholder="Got a discount?">
    </div>
    <button id="checkout-submit" onclick="document.getElementById('order-confirm').style.display='block'">Place order</button>
    <div id="order-confirm" style="display:none">Order placed! Ref: KAM-2847</div>
</body>
</html>
